# RORORO -- pre-merge CI gate.
#
# Runs the FULL-SOLUTION build + test (dotnet test ROROROblox.slnx, incl. the
# ROROROblox.PluginTestHarness integration project) on every push and PR. This is the gate that
# would have caught the three breaks that reached the feat/clan-link-host-support branch while the
# unit-only workflow stayed green: a typed-client ctor ambiguity (startup crash), a non-compiling
# integration harness, and a DI break. Lesson, now enforced: unit-green is NOT landable -- the
# whole-solution test is.
#
# Why a Windows runner: WPF (net10.0-windows) + the integration harness only build on Windows.

name: ci

# push scoped to main: pull_request already covers every PR branch commit, and an unscoped
# push trigger double-ran the full Windows build per commit (push ref != PR merge ref, so the
# concurrency group never deduped them).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'

jobs:
  # CI twin of the per-machine pre-commit hooks (CLAUDE.md: "the pre-commit hook AND CI must
  # fail loud"). The hooks scan the staged diff on the committing machine; this job scans the
  # full tracked tree, so a .ROBLOSECURITY cookie or hardcoded user-profile path committed
  # from a box without the hooks installed (or with --no-verify) still fails the gate.
  guards:
    name: secret-scan + local-path guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan (full tree)
        run: SCAN_ALL=1 bash .claude/hooks/pre-commit-secret-scan.sh

      - name: Local-path guard (full tree)
        run: SCAN_ALL=1 bash .claude/hooks/pre-commit-local-path-guard.sh

  build-test:
    name: build + full-solution test
    needs: guards
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ROROROblox.slnx

      - name: Build (full solution)
        run: dotnet build ROROROblox.slnx --configuration Release --no-restore

      - name: Test (full solution -- unit + integration harness)
        run: dotnet test ROROROblox.slnx --configuration Release --no-build --logger "console;verbosity=minimal"
