<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="theme-color" content="#0f1f31" />

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:image" content="{{ '/images/hero-wide.png' | absolute_url }}" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="{{ '/images/hero.png' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/brand.css' | relative_url }}" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand__name">RORORO</span>
        <span class="brand__sep" aria-hidden="true">·</span>
        <span class="brand__by">626 Labs</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="https://github.com/estevanhernandez-stack-ed/ROROROblox/releases">Releases</a>
        <a href="{{ '/PRIVACY/' | relative_url }}">Privacy</a>
        <a href="https://github.com/estevanhernandez-stack-ed/ROROROblox" class="site-nav__github">Source</a>
      </nav>
    </div>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="micro">A 626 Labs product · Imagine Something Else</p>
      <p class="caption">
        &copy; 626 Labs LLC ·
        <a href="https://github.com/estevanhernandez-stack-ed/ROROROblox/blob/main/LICENSE">MIT</a> ·
        <a href="https://github.com/estevanhernandez-stack-ed/ROROROblox/issues">Report an issue</a>
      </p>
    </div>
  </footer>
</body>
</html>
