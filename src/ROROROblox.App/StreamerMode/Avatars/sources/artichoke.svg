<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0" stop-color="#192e44"/>
      <stop offset="1" stop-color="#0f1f31"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background -->
  <rect width="256" height="256" fill="url(#bg)"/>

  <!-- soft magenta glow disc behind the character -->
  <circle cx="128" cy="132" r="105" fill="#f22f89" opacity="0.08"/>

  <!-- tiny star dots (outer background atmosphere) -->
  <circle cx="30" cy="40" r="2.5" fill="#f4f7fb" opacity="0.9"/>
  <circle cx="222" cy="52" r="2.5" fill="#17d4fa" opacity="0.9"/>
  <circle cx="38" cy="214" r="2.5" fill="#f22f89" opacity="0.9"/>
  <circle cx="226" cy="204" r="2" fill="#f4f7fb" opacity="0.7"/>

  <g stroke="#0f1f31" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">

    <!-- lower side leaves (widest, back-most) -->
    <path d="M0 0 C-17 -7 -23 -41 0 -70 C23 -41 17 -7 0 0 Z" fill="#0ea8c9" transform="translate(128,150) rotate(-80)"/>
    <path d="M0 0 C-17 -7 -23 -41 0 -70 C23 -41 17 -7 0 0 Z" fill="#0ea8c9" transform="translate(128,150) rotate(80)"/>

    <!-- back petal row -->
    <path d="M0 0 C-19 -9 -27 -49 0 -84 C27 -49 19 -9 0 0 Z" fill="#0ea8c9" transform="translate(128,150) rotate(-56)"/>
    <path d="M0 0 C-19 -9 -27 -49 0 -84 C27 -49 19 -9 0 0 Z" fill="#0ea8c9" transform="translate(128,150) rotate(56)"/>
    <path d="M0 0 C-21 -10 -29 -54 0 -92 C29 -54 21 -10 0 0 Z" fill="#0ea8c9" transform="translate(128,150) rotate(-32)"/>
    <path d="M0 0 C-21 -10 -29 -54 0 -92 C29 -54 21 -10 0 0 Z" fill="#0ea8c9" transform="translate(128,150) rotate(32)"/>

    <!-- magenta bloom tuft at the crown (artichokes flower magenta) -->
    <g stroke="#c21f6b">
      <path d="M0 0 C-11 -5 -14 -30 0 -52 C14 -30 11 -5 0 0 Z" fill="#f22f89" transform="translate(128,110) rotate(-22)"/>
      <path d="M0 0 C-11 -5 -14 -30 0 -52 C14 -30 11 -5 0 0 Z" fill="#f22f89" transform="translate(128,110) rotate(22)"/>
      <path d="M0 0 C-12 -6 -16 -34 0 -58 C16 -34 12 -6 0 0 Z" fill="#f22f89" transform="translate(128,110)"/>
    </g>

    <!-- bright mid petals framing the bloom -->
    <path d="M0 0 C-19 -8 -26 -46 0 -78 C26 -46 19 -8 0 0 Z" fill="#17d4fa" transform="translate(128,150) rotate(-20)"/>
    <path d="M0 0 C-19 -8 -26 -46 0 -78 C26 -46 19 -8 0 0 Z" fill="#17d4fa" transform="translate(128,150) rotate(20)"/>

    <!-- front bud (the body) -->
    <path d="M72 142 C72 180 94 202 128 202 C162 202 184 180 184 142 C184 112 160 96 128 96 C96 96 72 112 72 142 Z" fill="#17d4fa"/>

    <!-- soft highlight on the bud -->
    <path d="M85 132 Q84 114 97 106" fill="none" stroke="#f4f7fb" opacity="0.45"/>

    <!-- overlapping scale details -->
    <path d="M115 112 Q128 102 141 112" fill="none" stroke="#0ea8c9"/>
    <path d="M98 189 Q113 172 128 189" fill="none" stroke="#0ea8c9"/>
    <path d="M128 189 Q143 172 158 189" fill="none" stroke="#0ea8c9"/>

    <!-- face: sleepy warm smile -->
    <ellipse cx="106" cy="134" rx="11" ry="12" fill="#f4f7fb" stroke="none"/>
    <ellipse cx="150" cy="134" rx="11" ry="12" fill="#f4f7fb" stroke="none"/>
    <circle cx="106" cy="137" r="5" fill="#0f1f31" stroke="none"/>
    <circle cx="150" cy="137" r="5" fill="#0f1f31" stroke="none"/>
    <circle cx="108" cy="135" r="1.8" fill="#f4f7fb" stroke="none"/>
    <circle cx="152" cy="135" r="1.8" fill="#f4f7fb" stroke="none"/>
    <!-- relaxed sleepy lids (bud-colored fill masks eye tops, navy crease line arching gently) -->
    <path d="M94 130 Q94 116 106 116 Q118 116 118 130 Q106 124 94 130 Z" fill="#17d4fa" stroke="none"/>
    <path d="M138 130 Q138 116 150 116 Q162 116 162 130 Q150 124 138 130 Z" fill="#17d4fa" stroke="none"/>
    <path d="M94 130 Q106 124 118 130" fill="none"/>
    <path d="M138 130 Q150 124 162 130" fill="none"/>
    <!-- smile -->
    <path d="M115 156 Q128 166 141 156" fill="none"/>
    <!-- magenta cheeks -->
    <ellipse cx="89" cy="151" rx="9.5" ry="6.5" fill="#f22f89" stroke="none"/>
    <ellipse cx="167" cy="151" rx="9.5" ry="6.5" fill="#f22f89" stroke="none"/>
  </g>
</svg>
