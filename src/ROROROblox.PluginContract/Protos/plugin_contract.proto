syntax = "proto3";

option csharp_namespace = "ROROROblox.PluginContract";

package rororo.plugin.v1;

// =====================================================================
// Services
// =====================================================================

// RoRoRoHost — implemented by RoRoRo, called by the plugin.
service RoRoRoHost {
  // Handshake — first call after the named-pipe connection is established.
  // Plugin sends manifest hash + contract version; RoRoRo responds with host info
  // or rejects the connection.
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  // Read surface
  rpc GetHostInfo(Empty) returns (HostInfo);
  rpc GetRunningAccounts(Empty) returns (RunningAccountsList);

  // Server-streaming events
  rpc SubscribeAccountLaunched(SubscriptionRequest) returns (stream AccountLaunchedEvent);
  rpc SubscribeAccountExited(SubscriptionRequest) returns (stream AccountExitedEvent);
  rpc SubscribeMutexStateChanged(SubscriptionRequest) returns (stream MutexStateEvent);

  // Command surface
  rpc RequestLaunch(LaunchRequest) returns (LaunchResult);

  // Command surface (contract 1.0, additive in NuGet 0.2.0)
  rpc RequestLaunchTarget(LaunchTargetRequest) returns (LaunchResult);
  // Query surface (additive)
  rpc GetCurrentServer(Empty) returns (CurrentServer);
  // Query surface (additive, NuGet 0.3.0): per-account idle awareness.
  rpc GetAccountActivity(Empty) returns (AccountActivityList);

  // Command surface (additive, NuGet 0.5.0): a keep-alive plugin credits an account as
  // active after it acts on that account's window (idle heuristic can't see plugin input).
  rpc MarkAccountActive(MarkAccountActiveRequest) returns (Empty);

  // Command surface (additive, NuGet 0.6.0): stop Roblox clients RoRoRo tracks, per account.
  // Graceful close (CloseMainWindow) first, hard kill only as fallback — the same sequence the
  // main window's per-account close button uses. Never touches an untracked process: clients
  // RoRoRo did not launch (or could not re-attach to) are the startup leftover gate's problem,
  // not this rpc's.
  //
  // stopped_count means the stop was ISSUED, not that the client is gone — process exit is
  // asynchronous. A caller relaunching an account must poll GetRunningAccounts until the
  // account disappears, or it will race the dying client.
  rpc StopAccounts(StopAccountsRequest) returns (StopAccountsResult);

  // UI surface (v1: tray menu, row badge, status panel)
  rpc AddTrayMenuItem(MenuItemSpec) returns (UIHandle);
  rpc AddRowBadge(RowBadgeSpec) returns (UIHandle);
  rpc AddStatusPanel(StatusPanelSpec) returns (UIHandle);
  rpc UpdateUI(UIUpdate) returns (Empty);
  rpc RemoveUI(UIHandle) returns (Empty);
}

// Plugin — implemented by the plugin, called by RoRoRo.
service Plugin {
  rpc OnUIInteraction(UIInteractionEvent) returns (Empty);
  rpc OnConsentChanged(ConsentChangeEvent) returns (Empty);
  rpc OnShutdown(Empty) returns (Empty);
}

// =====================================================================
// Messages
// =====================================================================

message Empty {}

message HandshakeRequest {
  string plugin_id = 1;
  string manifest_sha256 = 2;
  string contract_version = 3;  // semver, e.g. "1.0"
  repeated string declared_capabilities = 4;
}

message HandshakeResponse {
  bool accepted = 1;
  string reject_reason = 2;
  string host_version = 3;
  string contract_version = 4;
}

message HostInfo {
  string version = 1;
  bool multi_instance_enabled = 2;
  string multi_instance_state = 3;  // "On" / "Off" / "Error"
}

message RunningAccountsList {
  repeated RunningAccount accounts = 1;
}

message RunningAccount {
  string account_id = 1;       // RoRoRo internal Guid as string
  int64 roblox_user_id = 2;    // UID-aware: which Roblox user this account is
  string display_name = 3;
  int32 process_id = 4;
  // Game identity from the host's presence tracking (0.4.0). 0 / empty when
  // unknown — presence can lag a fresh launch; plugins must treat that as
  // "no game info", never as a game named "".
  int64 place_id = 5;
  string place_name = 6;
}

message SubscriptionRequest {
  // No filters in v1 — plugin subscribes to all events.
}

message AccountLaunchedEvent {
  string account_id = 1;
  int64 roblox_user_id = 2;
  string display_name = 3;
  int32 process_id = 4;
  int64 launched_at_unix_ms = 5;
  // Game identity from the host's presence tracking (0.4.0). Often still
  // 0 / empty at launch time (presence lags the process attach) — plugins
  // wanting fresh identity should re-query GetRunningAccounts.
  int64 place_id = 6;
  string place_name = 7;
}

message AccountExitedEvent {
  string account_id = 1;
  int64 roblox_user_id = 2;
  int32 process_id = 3;
  int64 exited_at_unix_ms = 4;
}

message MutexStateEvent {
  string state = 1;  // "On" / "Off" / "Error"
}

message LaunchRequest {
  string account_id = 1;
  // future: place_id, fps_cap (not v1)
}

message LaunchResult {
  bool ok = 1;
  string failure_reason = 2;
  int32 process_id = 3;
}

message LaunchTargetRequest {
  string account_id = 1;
  oneof target {
    // A Roblox server link in ANY form the host understands (private-server share
    // URL, PlaceLauncher accessCode URL, roblox.com/share token, public game URL,
    // or a bare place id). The host resolves it via its existing share-URL resolver.
    string share_url = 2;
    // Follow a friend into whatever server they're in (Roblox permission-checks).
    int64 follow_user_id = 3;
  }
}

message CurrentServer {
  bool present = 1;                    // false when no private server has been launched
  string share_url = 2;               // ready-to-post shareable link
  string place_name = 3;
  int64  place_id = 4;
  int64  last_launched_at_unix_ms = 5;
}

message AccountActivity {
  string account_id = 1;
  int64  last_activity_unix_ms = 2;
  int64  seconds_since_activity = 3;
}

message AccountActivityList {
  repeated AccountActivity items = 1;
}

message MarkAccountActiveRequest {
  string account_id = 1;
}

message StopAccountsRequest {
  // Empty = every account RoRoRo is currently tracking a client for.
  // Otherwise, only these accounts. Ids RoRoRo isn't tracking come back in
  // failed_account_ids rather than failing the whole call.
  repeated string account_ids = 1;
}

message StopAccountsResult {
  int32 stopped_count = 1;
  // Unknown id, no tracked client, or the close+kill sequence failed.
  repeated string failed_account_ids = 2;
}

message UIHandle {
  string id = 1;  // RoRoRo-issued, opaque to plugin
}

message MenuItemSpec {
  string label = 1;
  string tooltip = 2;
  bool enabled = 3;
}

message RowBadgeSpec {
  string text = 1;
  string color_hex = 2;  // optional override; default to brand cyan
  string tooltip = 3;
}

message StatusPanelSpec {
  string title = 1;
  string body_markdown = 2;  // basic markdown subset (bold, italic, lists)
}

message UIUpdate {
  UIHandle handle = 1;
  oneof kind {
    MenuItemSpec menu_item = 2;
    RowBadgeSpec row_badge = 3;
    StatusPanelSpec status_panel = 4;
  }
}

message UIInteractionEvent {
  UIHandle handle = 1;
  string interaction_kind = 2;  // "click", "hover-enter", "hover-leave"
  int64 timestamp_unix_ms = 3;
}

message ConsentChangeEvent {
  repeated string newly_granted_capabilities = 1;
  repeated string newly_revoked_capabilities = 2;
}
